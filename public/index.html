function isTutorialDone(){try{return localStorage.getItem('pwd_tut_done')==='1'}catch(e){return false}}
function markTutorialDone(){try{localStorage.setItem('pwd_tut_done','1')}catch(e){}}
function showTutTip(sn,badge,html,btn,cb){var t=$('tut-tooltip'),d='';for(var i=0;i<TUT.totalSteps;i++){d+='<div class="tut-dot '+(i<sn?'done':i===sn?'active':'')+'"></div>'}t.innerHTML='<div class="tut-step-dots">'+d+'</div><div class="tut-badge">'+badge+'</div><div class="tut-text">'+html+'</div><button class="tut-btn" id="tut-next-btn">'+btn+'</button><button class="tut-skip" id="tut-skip-btn">Skip tutorial</button>';show(t);$('tut-next-btn').onclick=function(){hide(t);if(cb)cb()};$('tut-skip-btn').onclick=function(){endTutorial()}}
function endTutorial(){TUT.active=false;hide($('tut-tooltip'));markTutorialDone();showScreen('setup');turnTimeline.innerHTML='';$('score-a').textContent='0';$('score-b').textContent='0';hideInputs();hide(statusBanner);roundOverlay.classList.remove('active')}
function startTutorial(){TUT.active=true;G.teamA.human='You';G.teamA.humanRole='guesser';G.teamA.bot='Nova';G.teamA.score=0;G.teamB.human='Friend';G.teamB.humanRole='guesser';G.teamB.bot='Byte';G.teamB.score=0;G.word='GUITAR';G.category='Music';G.clueCountA=0;G.clueCountB=0;G.allClues=[];G.allGuesses=[];G.roundOver=false;showScreen('game');$('round-label').textContent='TUTORIAL';$('category-label').textContent='Music';$('points-badge').textContent='10 PTS';$('score-a').textContent='0';$('score-b').textContent='0';turnTimeline.innerHTML='';hideInputs();hide(statusBanner);showTutTip(0,'Welcome','This is <strong>Password Duel</strong>! Two teams race to guess a secret word. Each has a <strong>clue-giver</strong> and a <strong>guesser</strong>.','Got it!',tS1)}
function tS1(){showTutTip(1,'The Round','Secret word: <strong>GUITAR</strong> (Music). Clue-givers give <strong>one-word clues</strong>.','Next',tS2)}
function tS2(){setStatus('\uD83E\uDD16 Nova is thinking...','ai-status');setTimeout(function(){hide(statusBanner);G.allClues.push({word:'STRINGS',team:'a',giver:'Nova'});G._currentTurnCard=createTurnCard('a',1,'Nova','STRINGS');showTutTip(2,'Clue Given','\uD83E\uDD16 <span class="hl-ta">Nova</span> gave <strong>"STRINGS"</strong>. Your turn!','Let me guess!',tS3)},1200)}
function tS3(){setStatus('\uD83C\uDFAF You, guess!','ta-turn');guessInput.value='';guessInput.placeholder='Type a wrong guess like PIANO...';guessInput.className='guess-input ta-active';guessBtn.className='guess-btn ta-btn';guessBtn.textContent='GO';show(inputArea);hide(passBtn);hide(inputHint);guessInput.focus();G._submitMode='tut-wrong'}
function tS4(w){fillGuessInCard(G._currentTurnCard,'You',w,false,false);hideInputs();hide(statusBanner);showTutTip(3,'Wrong Guess!','\u274C <strong>"'+w.toUpperCase()+'"</strong> wasn\'t right. Other team goes. Points: 10\u21928\u21926\u21924\u21922.','Next',tS5)}
function tS5(){setStatus('\uD83E\uDD16 Byte is thinking...','ai-status');setTimeout(function(){hide(statusBanner);G.allClues.push({word:'FRETS',team:'b',giver:'Byte'});var c=createTurnCard('b',1,'Byte','FRETS');setTimeout(function(){fillGuessInCard(c,'Friend','UKULELE',false,false);showTutTip(4,'Teams Alternate','<span class="hl-tb">Byte</span> gave <strong>"FRETS"</strong>, Friend guessed <strong>"UKULELE"</strong> \u274C. Teams alternate!','Next',tS6)},800)},1200)}
function tS6(){setStatus('\uD83E\uDD16 Nova...','ai-status');setTimeout(function(){hide(statusBanner);G.allClues.push({word:'ACOUSTIC',team:'a',giver:'Nova'});G._currentTurnCard=createTurnCard('a',2,'Nova','ACOUSTIC');showTutTip(5,'More Clues!','Nova: <strong>"ACOUSTIC"</strong>. Worth <strong>8 pts</strong>. Type <strong>GUITAR</strong>!','Let me guess!',tS7)},1000)}
function tS7(){setStatus('\uD83C\uDFAF You, guess!','ta-turn');guessInput.value='';guessInput.placeholder='Type GUITAR...';guessInput.className='guess-input ta-active';guessBtn.className='guess-btn ta-btn';guessBtn.textContent='GO';show(inputArea);hide(passBtn);hide(inputHint);guessInput.focus();G._submitMode='tut-correct'}
function tS8(){fillGuessInCard(G._currentTurnCard,'You','GUITAR',true,false);hideInputs();hide(statusBanner);showTutTip(6,'You Got It!','\u2705 <strong>GUITAR</strong> correct! Alpha scores <strong>8 pts</strong>!','Start Playing!',function(){endTutorial()})}
document.querySelectorAll('.role-toggle[data-player^="p"]').forEach(function(tg){var p=tg.dataset.player,pt=p==='p1'?'bot1':'bot2';tg.querySelectorAll('.role-btn').forEach(function(b){b.addEventListener('click',function(){tg.querySelectorAll('.role-btn').forEach(function(x){x.classList.remove('selected')});b.classList.add('selected');var o=document.querySelector('.role-toggle[data-player="'+pt+'"]'),r=b.dataset.role==='guesser'?'cluer':'guesser';o.querySelectorAll('.role-btn').forEach(function(x){x.classList.remove('selected');if(x.dataset.role===r)x.classList.add('selected')})})})});
roundsGroup.querySelectorAll('.pill-btn').forEach(function(b){b.addEventListener('click',function(){roundsGroup.querySelectorAll('.pill-btn').forEach(function(x){x.classList.remove('selected')});b.classList.add('selected');G.totalRounds=parseInt(b.dataset.val)})});
diffGroup.querySelectorAll('.pill-btn').forEach(function(b){b.addEventListener('click',function(){diffGroup.querySelectorAll('.pill-btn').forEach(function(x){x.classList.remove('selected','diff-sel')});b.classList.add('diff-sel');G.difficulty=b.dataset.val})});
$('start-btn').addEventListener('click',function(){if(!isTutorialDone())startTutorial();else startGame()});
$('next-btn').addEventListener('click',nextRound);$('play-again-btn').addEventListener('click',function(){location.reload()});
guessBtn.addEventListener('click',submitHuman);guessInput.addEventListener('keydown',function(e){if(e.key==='Enter')submitHuman()});passBtn.addEventListener('click',handlePass);
function showScreen(n){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});$(n+'-screen').classList.add('active')}
function getRole(p){return document.querySelector('.role-toggle[data-player="'+p+'"] .role-btn.selected').dataset.role}
function cluerOf(t){var o=t==='a'?G.teamA:G.teamB;return o.humanRole==='cluer'?{name:o.human,isBot:false}:{name:o.bot,isBot:true}}
function guesserOf(t){var o=t==='a'?G.teamA:G.teamB;return o.humanRole==='guesser'?{name:o.human,isBot:false}:{name:o.bot,isBot:true}}
function currentPoints(){var t=G.clueCountA+G.clueCountB;return t===0?10:Math.max(10-(t-1)*2,2)}
function updatePointsBadge(){$('points-badge').textContent=currentPoints()+' PTS'}
function setStatus(h,c){statusBanner.className='status-banner '+c;statusBanner.innerHTML=h;show(statusBanner)}
function hideInputs(){hide(inputArea);hide(passBtn);hide(inputHint)}
function allClueWords(){return G.allClues.map(function(c){return c.word.toUpperCase()})}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function createTurnCard(team,cn,gn,cw){var tl=team==='a'?'ALPHA':'BETA',pts=TUT.active?(G.allClues.length<=1?10:8):currentPoints(),card=document.createElement('div');card.className='turn-card t'+team+'-card';card.innerHTML='<div class="turn-card-header"><span class="turn-team-label">'+tl+' \u00B7 TURN '+cn+'</span><span class="turn-num">'+pts+' pts</span></div><div class="turn-clue-row"><span class="turn-role-tag">CLUE</span><span class="turn-clue-word">'+cw.toUpperCase()+'</span><span class="turn-clue-giver">'+gn+'</span></div><div class="turn-guess-row" id="guess-slot-pending"><span class="turn-role-tag">GUESS</span><span class="turn-guess-word" style="color:var(--text-dim);font-style:italic">waiting...</span></div>';turnTimeline.appendChild(card);card.scrollIntoView({behavior:'smooth',block:'end'});return card}
function fillGuessInCard(card,gn,gw,ok,pass){var s=card.querySelector('#guess-slot-pending');if(!s)return;s.removeAttribute('id');if(pass)s.innerHTML='<span class="turn-role-tag">GUESS</span><span class="turn-guess-word passed">passed</span><span class="turn-guess-giver">'+gn+'</span><span class="turn-guess-result">\u23ED</span>';else s.innerHTML='<span class="turn-role-tag">GUESS</span><span class="turn-guess-word '+(ok?'correct':'wrong')+'">'+gw.toUpperCase()+'</span><span class="turn-guess-giver">'+gn+'</span><span class="turn-guess-result">'+(ok?'\u2705':'\u274C')+'</span>'}

// AI
var BOT_STYLE={Nova:'You think like a poet. Prefer abstract, metaphorical, sensory clues.',Byte:'You think like an engineer. Prefer concrete, technical, structural clues.'};
function aiCall(p){
  return fetch('/.netlify/functions/get-clue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,temperature:1})})
  .then(function(r){
    if(!r.ok) return r.json().catch(function(){return{error:'HTTP '+r.status}}).then(function(e){throw new Error(e.detail||e.error||'API error '+r.status)});
    return r.json()
  })
  .then(function(d){return d.response||''})
}

function fetchAIClue(word,cat,used,cn,botName,attempt){
  attempt=attempt||1;
  var style=BOT_STYLE[botName]||'',nonce=Math.random().toString(36).substr(2,8);
  var usedStr=used.length>0?'FORBIDDEN (already used): ['+used.join(', ')+']. Pick COMPLETELY DIFFERENT.':'';
  var hint=cn<=2?'Be creative and tricky.':cn<=4?'Be moderately helpful.':'Be very direct.';
  var prompt='You are "'+botName+'". '+style+'\nPassword game. Secret: "'+word+'" ('+cat+'). Nonce: '+nonce+'\nRules: ONE word clue. Cannot BE/CONTAIN/rhyme secret word. '+usedStr+'\nClue #'+cn+': '+hint+'\nONLY ONE WORD.';
  return aiCall(prompt).then(function(r){
    var c=r.replace(/[^a-zA-Z]/g,''),u=c.toUpperCase();
    if(c&&u!==word.toUpperCase()&&used.indexOf(u)===-1)return c;
    if(attempt<3)return fetchAIClue(word,cat,used,cn,botName,attempt+1);
    var fb=['related','similar','connected','linked','associated','nearby','close'];
    for(var i=0;i<fb.length;i++)if(used.indexOf(fb[i].toUpperCase())===-1)return fb[i];
    return'hint'
  })
}

function fetchAIGuess(cat,clues,guesses){
  var cl=clues.map(function(c,i){return(i+1)+'. "'+c.word+'" ('+c.giver+')'}).join('\n');
  var pg=guesses.length>0?'\nWrong (do NOT repeat): ['+guesses.join(', ')+'].':'';
  return aiCall('Password. Category: "'+cat+'".\nClues:\n'+cl+pg+'\nGuess. ONLY one word.')
}

function startGame(){G.teamA.human=$('p1-name').value.trim()||'Player 1';G.teamA.humanRole=getRole('p1');G.teamB.human=$('p2-name').value.trim()||'Player 2';G.teamB.humanRole=getRole('p2');G.teamA.score=0;G.teamB.score=0;G.round=0;G.whosFirst='a';G._shuffledWords=shuffleArray(WORDS[G.difficulty]);$('score-a').textContent='0';$('score-b').textContent='0';showScreen('game');nextRound()}
function nextRound(){roundOverlay.classList.remove('active');G.round++;if(G.round>G.totalRounds){showFinal();return}G.clueCountA=0;G.clueCountB=0;G.allClues=[];G.allGuesses=[];G.roundOver=false;G._currentTurnCard=null;G.whosFirst=G.round%2===1?'a':'b';var idx=(G.round-1)%G._shuffledWords.length;if(idx===0&&G.round>1)G._shuffledWords=shuffleArray(WORDS[G.difficulty]);var pick=G._shuffledWords[idx];G.word=pick.w;G.category=pick.c;$('round-label').textContent='ROUND '+G.round+' / '+G.totalRounds;$('category-label').textContent=G.category;turnTimeline.innerHTML='';hideInputs();updatePointsBadge();doCluePhase(G.whosFirst)}

function doCluePhase(team){
  if(G.roundOver)return;var key=team==='a'?'clueCountA':'clueCountB';
  if(G[key]>=MAX_CLUES){var ot=team==='a'?'b':'a',ok=ot==='a'?'clueCountA':'clueCountB';if(G[ok]>=MAX_CLUES){endRound(null);return}doCluePhase(ot);return}
  G[key]++;var cn=G[key],cluer=cluerOf(team);
  if(cluer.isBot){
    setStatus('\uD83E\uDD16 '+cluer.name+' is thinking <span class="dots-inline"><span></span><span></span><span></span></span>','ai-status');hideInputs();
    sleep(800+Math.random()*700).then(function(){return fetchAIClue(G.word,G.category,allClueWords(),cn,cluer.name)}).then(function(clue){
      if(G.roundOver)return;G.allClues.push({word:clue,team:team,giver:cluer.name});G._currentTurnCard=createTurnCard(team,cn,cluer.name,clue);updatePointsBadge();hide(statusBanner);doGuessPhase(team)
    }).catch(function(err){
      G[key]--;
      showError('AI failed: '+err.message,function(){doCluePhase(team)})
    })
  }else{
    setStatus('\uD83D\uDD11 '+cluer.name+', give a one-word clue!','t'+team+'-turn');guessInput.value='';guessInput.placeholder='One-word clue...';guessInput.className='guess-input t'+team+'-active';guessBtn.className='guess-btn t'+team+'-btn';guessBtn.textContent='GIVE';show(inputArea);hide(passBtn);show(inputHint);inputHint.textContent='Give your partner a one-word clue';guessInput.focus();G._submitMode='clue';G._clueTeam=team;G._clueNum=cn
  }
}

function doGuessPhase(team){
  if(G.roundOver)return;var gs=guesserOf(team);
  if(gs.isBot){
    setStatus('\uD83E\uDD16 '+gs.name+' is guessing <span class="dots-inline"><span></span><span></span><span></span></span>','ai-status');hideInputs();
    sleep(1200+Math.random()*1000).then(function(){return fetchAIGuess(G.category,G.allClues,G.allGuesses)}).then(function(r){
      if(G.roundOver)return;var guess=r.replace(/[^a-zA-Z]/g,'')||'unknown';var ok=guess.toUpperCase()===G.word.toUpperCase();if(!ok)G.allGuesses.push(guess.toUpperCase());fillGuessInCard(G._currentTurnCard,gs.name,guess,ok,false);hide(statusBanner);if(ok){endRound(team);return}advanceAfterGuess(team)
    }).catch(function(err){
      showError('AI failed: '+err.message,function(){doGuessPhase(team)})
    })
  }else{
    setStatus('\uD83C\uDFAF '+gs.name+', guess the word!','t'+team+'-turn');guessInput.value='';guessInput.placeholder=gs.name+', your guess...';guessInput.className='guess-input t'+team+'-active';guessBtn.className='guess-btn t'+team+'-btn';guessBtn.textContent='GO';show(inputArea);show(passBtn);hide(inputHint);guessInput.focus();G._submitMode='guess';G._guessTeam=team
  }
}

function advanceAfterGuess(tj){var o=tj==='a'?'b':'a';if(G[o==='a'?'clueCountA':'clueCountB']<MAX_CLUES)doCluePhase(o);else if(G[tj==='a'?'clueCountA':'clueCountB']<MAX_CLUES)doCluePhase(tj);else endRound(null)}
function submitHuman(){var val=guessInput.value.trim();if(!val)return;if(G._submitMode==='tut-wrong'){var w=val.toUpperCase().replace(/[^A-Z]/g,'');if(!w)return;if(w==='GUITAR'){guessInput.value='';guessInput.placeholder='Try a wrong guess first!';return}hideInputs();hide(statusBanner);tS4(w);return}if(G._submitMode==='tut-correct'){var w=val.toUpperCase().replace(/[^A-Z]/g,'');if(!w)return;if(w!=='GUITAR'){guessInput.value='';guessInput.placeholder='Type GUITAR to continue...';return}hideInputs();hide(statusBanner);tS8();return}if(G._submitMode==='clue'){var c=val.replace(/[^a-zA-Z]/g,'');if(!c)return;var u=c.toUpperCase();if(u===G.word.toUpperCase()){guessInput.value='';guessInput.placeholder="Can't use the secret word!";return}if(allClueWords().indexOf(u)!==-1){guessInput.value='';guessInput.placeholder='That clue was already used!';return}var team=G._clueTeam,cluer=cluerOf(team);G.allClues.push({word:c,team:team,giver:cluer.name});G._currentTurnCard=createTurnCard(team,G._clueNum,cluer.name,c);updatePointsBadge();hideInputs();hide(statusBanner);doGuessPhase(team)}else{var g=val.toUpperCase().replace(/[^A-Z]/g,'');if(!g)return;var team=G._guessTeam,gs=guesserOf(team),ok=g===G.word.toUpperCase();if(!ok)G.allGuesses.push(g);fillGuessInCard(G._currentTurnCard,gs.name,g,ok,false);guessInput.value='';hideInputs();hide(statusBanner);if(ok){endRound(team);return}advanceAfterGuess(team)}}
function handlePass(){if(G._submitMode!=='guess')return;var team=G._guessTeam;fillGuessInCard(G._currentTurnCard,guesserOf(team).name,'',false,true);hideInputs();hide(statusBanner);advanceAfterGuess(team)}
function endRound(wt){if(TUT.active)return;G.roundOver=true;hideInputs();hide(statusBanner);$('result-word').textContent=G.word;if(wt){var pts=currentPoints();if(wt==='a')G.teamA.score+=pts;else G.teamB.score+=pts;$('score-a').textContent=G.teamA.score;$('score-b').textContent=G.teamB.score;var t=wt==='a'?G.teamA:G.teamB;$('result-emoji').textContent='\uD83C\uDF89';$('result-msg').innerHTML='<span class="'+(wt==='a'?'ta-hl':'tb-hl')+'">Team '+(wt==='a'?'Alpha':'Beta')+'</span> ('+t.human+' & '+t.bot+') scored <strong>'+pts+' points</strong>!'}else{$('result-emoji').textContent='\uD83D\uDE05';$('result-msg').innerHTML='Nobody guessed it!'}$('next-btn').textContent=G.round>=G.totalRounds?'SEE RESULTS':'NEXT ROUND';roundOverlay.classList.add('active')}
function showFinal(){showScreen('final');$('fs-a').textContent=G.teamA.score;$('fs-b').textContent=G.teamB.score;if(G.teamA.score>G.teamB.score){$('winner-title').textContent='Team Alpha Wins!';$('winner-title').className='winner-title ta-win';$('winner-members').textContent=G.teamA.human+' & '+G.teamA.bot}else if(G.teamB.score>G.teamA.score){$('winner-title').textContent='Team Beta Wins!';$('winner-title').className='winner-title tb-win';$('winner-members').textContent=G.teamB.human+' & '+G.teamB.bot}else{$('winner-title').textContent="It's a Tie!";$('winner-title').className='winner-title tie-game';$('winner-members').textContent='Well played, everyone!'}}
</script>
</body>
